<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Monitoring Cluster{% endblock %}</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #0b1020; color: #f5f5f5; }
        .navbar { background-color: #111827; }
        .card { background-color: #111827; border: 1px solid #1f2937; }
        .card-header { border-bottom: 1px solid #1f2937; }
        a, a:hover { color: #38bdf8; text-decoration: none; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="{{ url_for('overview') }}">Monitoring Cluster</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="{{ url_for('overview') }}">Overview</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('cluster') }}">Cluster</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('my_agents') }}">Agents</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('my_sites') }}">Sites</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('my_alerts') }}">Alertes</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('metrics_history') }}">Metrics</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('logs_page') }}">Logs</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('history_page') }}">History</a></li>
            </ul>
            <ul class="navbar-nav">
                {% if session.get('user_id') %}
                    <li class="nav-item"><span class="nav-link">{{ session.get('email') }}</span></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('logout') }}">Logout</a></li>
                {% else %}
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('login') }}">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('signup') }}">Signup</a></li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
