<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{{ title if title else "Monitoring Cluster" }}</title>

    <!-- Material Design Lite -->
    <link rel="stylesheet" href="https://code.getmdl.io/1.3.0/material.indigo-pink.min.css">
    <script defer src="https://code.getmdl.io/1.3.0/material.min.js"></script>

    <!-- Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

    <style>
        .page-content {
            padding: 20px;
        }
        .mdl-card {
            width: 100%;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="mdl-layout mdl-js-layout mdl-layout--fixed-drawer mdl-layout--fixed-header">

    <!-- Header -->
    <header class="mdl-layout__header">
        <div class="mdl-layout__header-row">
            <span class="mdl-layout-title">Monitoring Cluster</span>
            <div class="mdl-layout-spacer"></div>
        </div>
    </header>

    <!-- Sidebar -->
    <div class="mdl-layout__drawer">
        <span class="mdl-layout-title">Dashboard</span>
        <nav class="mdl-navigation">

            <a class="mdl-navigation__link" href="/overview">
                <i class="material-icons">dashboard</i> Vue globale
            </a>

            <a class="mdl-navigation__link" href="/agents">
                <i class="material-icons">memory</i> Agents
            </a>

            <a class="mdl-navigation__link" href="/sites">
                <i class="material-icons">public</i> Sites
            </a>

            <a class="mdl-navigation__link" href="/anomalies">
                <i class="material-icons">warning</i> Anomalies
            </a>

            <a class="mdl-navigation__link" href="/logs">
                <i class="material-icons">list</i> Logs
            </a>

            <a class="mdl-navigation__link" href="/history">
                <i class="material-icons">history</i> Historique
            </a>

            <a class="mdl-navigation__link" href="/metrics-history">
                <i class="material-icons">show_chart</i> Metrics
            </a>

            <a class="mdl-navigation__link" href="/balancing">
                <i class="material-icons">swap_horiz</i> Balancing
            </a>

            <a class="mdl-navigation__link" href="/network">
                <i class="material-icons">network_check</i> Réseau
            </a>

        </nav>
    </div>

    <!-- Content -->
    <main class="mdl-layout__content">
        <div class="page-content">
            {% block content %}{% endblock %}
        </div>
    </main>

</div>

</body>
</html>
