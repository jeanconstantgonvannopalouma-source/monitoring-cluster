<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Alertes du Cluster</title>
    <link rel="stylesheet" href="/static/style.css">

    <style>
        body {
            background: #0d1117;
            color: #e6edf3;
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
            margin-top: 20px;
            color: #58a6ff;
        }

        table {
            width: 95%;
            margin: auto;
            border-collapse: collapse;
            background: #161b22;
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #30363d;
        }

        th {
            background: #21262d;
            color: #58a6ff;
        }

        tr:hover {
            background: #1f2937;
        }

        .type {
            font-weight: bold;
            color: #ff7b72;
        }

        .time {
            color: #8b949e;
        }

        .category {
            color: #3fb950;
        }
    </style>
</head>

<body>

<h1>Alertes du Cluster</h1>

<table>
    <tr>
        <th>Source</th>
        <th>Type</th>
        <th>Détails</th>
        <th>Catégorie</th>
        <th>Horodatage</th>
    </tr>

    {% for a in alertes %}
    <tr>
        <td>{{ a.source }}</td>
        <td class="type">{{ a.type }}</td>
        <td>{{ a.details }}</td>
        <td class="category">{{ a.category }}</td>
        <td class="time">{{ a.time }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
