<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Cluster Map</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>
        body {
            background: #0d1117;
            color: #e6edf3;
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
            margin-top: 20px;
            color: #58a6ff;
        }

        #graph {
            width: 100%;
            height: 700px;
            margin-top: 20px;
        }

        .node circle {
            stroke: #fff;
            stroke-width: 2px;
        }

        .node text {
            fill: #e6edf3;
            font-size: 14px;
            font-weight: bold;
        }

        .link {
            stroke-width: 3px;
        }
    </style>
</head>

<body>

<h1>Cluster Map – Topologie Réseau</h1>

<div id="graph"></div>

<script>
    const data = {{ data | tojson }};

    const width = window.innerWidth;
    const height = 700;

    const svg = d3.select("#graph")
        .append("svg")
        .attr("width", width)
        .attr("height", height);

    // Simulation physique
    const simulation = d3.forceSimulation(data.nodes)
        .force("link", d3.forceLink(data.links).id(d => d.id).distance(200))
        .force("charge", d3.forceManyBody().strength(-500))
        .force("center", d3.forceCenter(width / 2, height / 2));

    // Couleurs des liens
    function linkColor(status) {
        if (status === "UP") return "#3fb950";      // vert
        if (status === "DOWN") return "#ff7b72";    // rouge
        return "#f0ad4e";                           // orange
    }

    // Liens
    const link = svg.append("g")
        .selectAll("line")
        .data(data.links)
        .enter()
        .append("line")
        .attr("class", "link")
        .style("stroke", d => linkColor(d.status));

    // Noeuds
    const node = svg.append("g")
        .selectAll("g")
        .data(data.nodes)
        .enter()
        .append("g")
        .attr("class", "node");

    node.append("circle")
        .attr("r", 30)
        .style("fill", d => d.status === "UP" ? "#238636" : "#ff7b72");

    node.append("text")
        .attr("dy", 5)
        .attr("text-anchor", "middle")
        .text(d => d.id);

    // Mise à jour des positions
    simulation.on("tick", () => {
        link
            .attr("x1", d => d.source.x)
            .attr("y1", d => d.source.y)
            .attr("x2", d => d.target.x)
            .attr("y2", d => d.target.y);

        node
            .attr("transform", d => `translate(${d.x},${d.y})`);
    });
</script>

</body>
</html>
