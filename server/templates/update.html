<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mise à jour des agents</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body style="background:#0d1117; color:white; font-family:Arial;">

<h1 style="text-align:center; color:#58a6ff;">Mise à jour des Agents</h1>

<div class="section" style="width:80%; margin:auto; background:#161b22; padding:20px; border-radius:10px;">
    <h2 style="color:#3fb950;">Sélectionner un agent</h2>

    <form method="POST" action="/update">
        <label for="agent">Agent :</label>
        <select name="agent" id="agent" style="width:100%; padding:10px; margin-top:10px;">
            {% for a in agents %}
            <option value="{{ a.name }}">{{ a.name }} ({{ a.ip }})</option>
            {% endfor %}
        </select>

        <h2 style="color:#3fb950; margin-top:20px;">Code à envoyer</h2>
        <textarea name="code" rows="15" style="width:100%; background:#0d1117; color:white; padding:10px;"></textarea>

        <button type="submit" style="margin-top:20px; padding:10px 20px; background:#238636; color:white; border:none; border-radius:5px;">
            Envoyer la mise à jour
        </button>
    </form>
</div>

</body>
</html>
