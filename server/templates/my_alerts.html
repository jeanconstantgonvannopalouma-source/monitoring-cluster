<!DOCTYPE html>
<html>
<head>
    <title>Mes Alertes</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border: 1px solid #ccc; text-align: left; }
        th { background-color: #f4f4f4; }
        .btn { padding: 8px 12px; background: #007bff; color: white; border-radius: 4px; text-decoration: none; }
        .btn:hover { background: #0056b3; }
    </style>
</head>
<body>

<h1>Mes Alertes</h1>

<a href="/overview" class="btn">Retour au Dashboard</a>

<table>
    <tr>
        <th>Source</th>
        <th>Type</th>
        <th>Détails</th>
        <th>Date</th>
        <th>Catégorie</th>
    </tr>

    {% for a in alerts %}
    <tr>
        <td>{{ a.source }}</td>
        <td>{{ a.type }}</td>
        <td>{{ a.details }}</td>
        <td>{{ a.timestamp }}</td>
        <td>{{ a.category }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
